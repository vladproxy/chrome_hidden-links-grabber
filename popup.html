<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hidden Links Grabber</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
      width: 480px;
      min-height: 120px;
      max-height: 600px;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: #161b27;
      border-bottom: 1px solid #1e2840;
      flex-shrink: 0;
    }

    .logo {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #f0f4ff;
      flex: 1;
      letter-spacing: 0.01em;
    }

    #scan-btn {
      background: #3b6ef7;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex-shrink: 0;
    }
    #scan-btn:hover:not(:disabled) { background: #5584ff; }
    #scan-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Info bar ── */
    .info-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: #12161f;
      border-bottom: 1px solid #1e2840;
      min-height: 32px;
      flex-shrink: 0;
    }

    .status {
      font-size: 12px;
      color: #8b99b5;
      flex: 1;
    }
    .status.ok    { color: #4ade80; }
    .status.error { color: #f87171; }

    #count {
      font-size: 12px;
      font-weight: 700;
      color: #f59e0b;
    }

    /* ── Results ── */
    #results {
      overflow-y: auto;
      flex: 1;
      padding: 10px 10px 6px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #empty {
      padding: 24px 14px;
      text-align: center;
      color: #4a5568;
      font-size: 13px;
    }
    #empty strong { display: block; font-size: 24px; margin-bottom: 6px; }

    /* ── Card ── */
    .card {
      background: #161b27;
      border: 1px solid #1e2840;
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .url-row {
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .url-row a {
      color: #60a5fa;
      text-decoration: none;
      font-size: 12px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      word-break: break-all;
      flex: 1;
      line-height: 1.4;
    }
    .url-row a:hover { text-decoration: underline; color: #93c5fd; }

    .copy-btn {
      background: #1e2840;
      color: #94a3b8;
      border: 1px solid #2d3a55;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s;
    }
    .copy-btn:hover { background: #2d3a55; color: #e2e8f0; }

    .link-text {
      color: #94a3b8;
      font-size: 11.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 2px;
    }

    .badge {
      display: inline-block;
      border-radius: 4px;
      padding: 1px 7px;
      font-size: 10.5px;
      font-family: 'SFMono-Regular', Consolas, monospace;
      font-weight: 600;
      line-height: 1.6;
    }
    .badge-reason { background: #2d1a0e; color: #fb923c; border: 1px solid #7c3504; }
    .badge-source { background: #0e1f2d; color: #60a5fa; border: 1px solid #0c4a6e; }
    .badge-rel    { background: #1a1a2e; color: #a78bfa; border: 1px solid #4c1d95; }

    /* ── Scrollbar ── */
    #results::-webkit-scrollbar { width: 5px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: #2d3a55; border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="#3b6ef7" stroke-width="1.5"/>
      <path d="M9 12h6M12 9v6" stroke="#f59e0b" stroke-width="2" stroke-linecap="round"/>
      <circle cx="6" cy="12" r="1.5" fill="#f87171"/>
      <circle cx="18" cy="12" r="1.5" fill="#f87171"/>
    </svg>
    <h1>Hidden Links Grabber</h1>
    <button id="scan-btn">Scan Page</button>
  </header>

  <div class="info-bar">
    <span class="status" id="status">Ready — click Scan Page to begin.</span>
    <span id="count"></span>
  </div>

  <div id="results"></div>

  <div id="empty" hidden>
    <strong>&#x1F50D;</strong>
    No hidden off-viewport links detected on this page.
  </div>

  <script src="popup.js"></script>
</body>
</html>
